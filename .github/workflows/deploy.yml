name: Deploy Pygame to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygbag
      - name: Build WASM/HTML5 with pygbag
        run: |
          # The --build flag tells pygbag to generate the static files in build/web
          python -m pygbag --build main.py
      - name: Fix Assets (Ensure assets directory is included)
        run: |
          # Sometimes pygbag needs manual asset copying if not auto-detected
          if [ -d "assets" ]; then cp -r assets build/web/; fi
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
